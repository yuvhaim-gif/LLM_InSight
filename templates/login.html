<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM🔍InSights - Login</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='50' font-size='90' dominant-baseline='middle' text-anchor='middle'>🎩</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #050209 0%, #0f0620 25%, #1a0f2e 50%, #0d0620 75%, #050209 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
}

body::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: float 20s ease-in-out infinite;
    pointer-events: none;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(180deg); }
}

.login-container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 50px 40px;
    border-radius: 50%;
    width: 550px;
    height: 550px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    z-index: 1;
    animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.login-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
    border-radius: 24px;
    pointer-events: none;
}

.logo-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 40px;
    box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
    border: 3px solid rgba(255, 255, 255, 0.2);
    animation: pulse 3s ease-in-out infinite;
    overflow: hidden;
    flex-shrink: 0;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3); }
    50% { box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6); }
}

.logo-circle h2 {
    font-family: 'Dancing Script', cursive;
    color: #ffffff;
    margin: 0;
    font-size: 1.4rem;
    font-weight: 700;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    letter-spacing: -0.5px;
    text-align: center;
    padding: 20px;
    line-height: 1.3;
}

.login-container h2 {
    font-family: 'Dancing Script', cursive;
    color: #ffffff;
    margin: 0;
    font-size: 2.2rem;
    font-weight: 700;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    letter-spacing: -0.5px;
}

.login-container .subtitle {
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 40px;
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.5px;
}

.form-group {
    margin-bottom: 18px;
    text-align: center;
    position: relative;
    width: 100%;
}

.form-group label {
    display: block;
    margin-bottom: 10px;
    color: rgba(255, 255, 255, 0.95);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.3px;
}

.form-group input {
    width: 90%;
    max-width: 280px;
    padding: 14px 18px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 25px;
    font-size: 14px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    margin: 0 auto;
    display: block;
}

.form-group input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.form-group input:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.18);
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
}

.login-btn {
    width: 90%;
    max-width: 280px;
    padding: 14px 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 12px;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.login-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
}

.login-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
}

.login-btn:hover::before {
    left: 100%;
}

.login-btn:active {
    transform: translateY(-1px);
}

.error-message {
    color: #ff6b6b;
    margin-top: 24px;
    padding: 16px 20px;
    background: rgba(255, 107, 107, 0.15);
    border-radius: 12px;
    border: 1px solid rgba(255, 107, 107, 0.3);
    backdrop-filter: blur(10px);
    font-weight: 500;
    animation: shake 0.6s ease-in-out;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

.footer {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.8);
    background: transparent;
    padding: 12px 24px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.footer .not-production {
    color: #ff6b6b;
    font-weight: 700;
}

@media (max-width: 768px) {
    .login-container {
        width: 450px;
        height: 450px;
        padding: 40px;
    }
    
    .login-container h2 {
        font-size: 1.8rem;
    }
    
    .logo-circle {
        width: 140px;
        height: 140px;
        margin: 0 auto 30px;
    }
}

@media (max-width: 480px) {
    .login-container {
        width: 350px;
        height: 350px;
        padding: 30px;
        margin: 16px;
    }
    
    .login-container h2 {
        font-size: 1.4rem;
    }
    
    .logo-circle {
        width: 100px;
        height: 100px;
        margin: 0 auto 20px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group input {
        padding: 14px 16px;
        font-size: 14px;
    }
}

@media (prefers-color-scheme: dark) {
    .login-container {
        background: rgba(17, 24, 39, 0.2);
    }
}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo-circle">
        <h2>LLM🔍<br>InSights</h2>
    </div>
    <form method="post">
        <div class="form-group">
            <label for="username">👤 Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">🔐 Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
    </form>
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
</div>
<div class="footer">
    <span class="not-production">⚠️ NOT for production, Demo only</span> ⚠️ All rights reserved to Yuval Haim
</div>
</body>
</html>
